spring:
  application:
    name: it-service-desk
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/servicedesk}
    username: ${DB_USERNAME:servicedesk}
    password: ${DB_PASSWORD:servicedesk}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  thymeleaf:
    cache: false

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: never

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

info:
  application:
    name: ${spring.application.name}
    description: Corporate IT service desk learning project

