services:
  postgres:
    image: postgres:16-alpine
    container_name: service-desk-postgres
    environment:
      POSTGRES_DB: servicedesk
      POSTGRES_USER: servicedesk
      POSTGRES_PASSWORD: servicedesk
    ports:
      - "5432:5432"
    volumes:
      - service-desk-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U servicedesk -d servicedesk"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  service-desk-postgres-data:

